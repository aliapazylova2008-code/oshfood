        { name: "Azur", type: "Ресторан", cuisine: "Восточная", address: "ул. Бекмамата Осмонова, 101/7а", price: 350, rating: 3.2, reviews: 90, options: ["🚴 Доставка"], gis: null },
        { name: "Суши Яки", type: "Суши-бар", cuisine: "Японская", address: "ул. Амир-Тимура, 9а Блок А", price: 500, rating: 3.6, reviews: 140, options: ["🚴 Доставка"], gis: null },
        { name: "Mone", type: "Ресторан", cuisine: "Японская", address: "ул. Аскар Шакиров, 108а", price: 1500, rating: 3.9, reviews: 220, options: ["🚴 Доставка"], gis: null },
        { name: "Шанхай Сити", type: "Кафе", cuisine: "Китайская", address: "ул. Нурматова, 22", price: 1000, rating: 3.7, reviews: 160, options: ["☀️ Веранда"], gis: null },
        { name: "Копуро", type: "Ресторан", cuisine: "", address: "ул. Алишера Навои, 17а/1", price: null, rating: 2.5, reviews: 40, options: [], gis: null }
    ];

    let partnerFilter = false;
    let currentType = "all";
    let currentOption = null;
    let sortBy = "rating-desc";

    function savePartners() {
        const partners = {};
        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            partners[cb.dataset.name] = cb.checked;
        });
        localStorage.setItem('osh_food_partners', JSON.stringify(partners));
    }

    function loadPartners() {
        const saved = localStorage.getItem('osh_food_partners');
        if (saved) {
            const partners = JSON.parse(saved);
            document.querySelectorAll('.partner-checkbox').forEach(cb => {
                if (partners[cb.dataset.name]) cb.checked = true;
            });
        }
    }

    function getGisLink(p) {
        if (p.gis) return p.gis;
        if (p.address && p.address !== "Ош" && p.address !== "Нет данных") {
            return `https://2gis.kg/search/${encodeURIComponent(p.name + ' ' + p.address)}`;
        }
        return `https://2gis.kg/search/${encodeURIComponent(p.name + ' Ош')}`;
    }

    function renderStars(rating) {
        const full = Math.floor(rating);
        const half = rating % 1 >= 0.5;
        let stars = '';
        for (let i = 0; i < full; i++) stars += '★';
        if (half) stars += '½';
        for (let i = stars.length; i < 5; i++) stars += '☆';
        return stars;
    }

    function renderTable() {
        let filtered = places.filter(p => {
            if (currentType !== "all" && p.type !== currentType) return false;
            if (currentOption && !p.options.includes(currentOption)) return false;
            if (partnerFilter) {
                const saved = localStorage.getItem('osh_food_partners');
                if (saved) {
                    const partners = JSON.parse(saved);
                    if (!partners[p.name]) return false;
                } else return false;
            }
            return true;
        });

        if (sortBy === 'rating-desc') filtered.sort((a,b) => b.rating - a.rating);
        else if (sortBy === 'name-asc') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortBy === 'price-low') filtered.sort((a,b) => (a.price || 9999) - (b.price || 9999));
        else if (sortBy === 'price-high') filtered.sort((a,b) => (b.price || 0) - (a.price || 0));

        document.getElementById('stats-count').innerHTML = `<i class="fas fa-chart-simple"></i> ${filtered.length} заведений`;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = filtered.map((p, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td><div class="place-name">${p.name}</div></td>
                <td><span class="type-badge-sm">${p.type}</span></td>
                <td class="address-cell">${p.cuisine}</td>
                <td class="address-cell">${p.address}</td>
                <td class="price-tag">${p.price ? `~ ${p.price} сом` : '—'}</td>
                <td>${p.options.map(opt => `<span class="badge">${opt}</span>`).join('')}</td>
                <td><div class="stars">${renderStars(p.rating)} <span class="rating-number">${p.rating}</span> <span class="reviews-count">(${p.reviews})</span></div></td>
                <td><a href="${getGisLink(p)}" target="_blank" class="gis-link"><i class="fas fa-external-link-alt"></i> 2ГИС</a></td>
                <td><input type="checkbox" class="partner-checkbox" data-name="${p.name}" ${localStorage.getItem('osh_food_partners') && JSON.parse(localStorage.getItem('osh_food_partners'))[p.name] ? 'checked' : ''}></td>
            </tr>
        `).join('');

        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            cb.addEventListener('change', () => { savePartners(); if(partnerFilter) renderTable(); });
        });
    }

    document.querySelectorAll('.filter-chip[data-filter="type"]').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip[data-filter="type"]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentType = chip.dataset.value;
            renderTable();
        });
        if (chip.dataset.value === "all") chip.classList.add('active');
    });

    document.querySelectorAll('.filter-chip[data-filter="option"]').forEach(chip => {
        chip.addEventListener('click', () => {
            const val = chip.dataset.value;
            if (currentOption === val) {
                currentOption = null;
                chip.classList.remove('active');
            } else {
                document.querySelectorAll('.filter-chip[data-filter="option"]').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentOption = val;
            }
            renderTable();
        });
    });

    document.getElementById('partner-chip').addEventListener('click', () => {
        partnerFilter = !partnerFilter;
        document.getElementById('partner-chip').classList.toggle('active', partnerFilter);
        renderTable();
    });

    document.getElementById('sort-select').addEventListener('change', (e) => {
        sortBy = e.target.value;
        renderTable();
    });

    renderTable();
    loadPartners();
</script>
</body>
</html>
