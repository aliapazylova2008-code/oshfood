            background: #f1f5f9;
            padding: 4px 10px;

            font-size: 14px;

            font-weight: 500;

        { name: "Копуро", type: "Ресторан", cuisine: "", address: "ул. Алишера Навои, 17а/1", price: null, rating: 2.5, reviews: 40, options: [], gis: null }
    ];

    let partnerFilter = false;
    let currentType = "all";
    let currentOption = null;
    let sortBy = "rating-desc";

    function savePartners() {
        const partners = {};
        document.querySelectorAll('.partner-checkbox-input').forEach(cb => {
            partners[cb.dataset.name] = cb.checked;
        });
        localStorage.setItem('osh_food_partners', JSON.stringify(partners));
    }

    function loadPartners() {
        const saved = localStorage.getItem('osh_food_partners');
        if (saved) {
            const partners = JSON.parse(saved);
            document.querySelectorAll('.partner-checkbox-input').forEach(cb => {
                if (partners[cb.dataset.name]) cb.checked = true;
            });
        }
    }

    function getGisLink(p) {
        if (p.gis) return p.gis;
        if (p.address && p.address !== "Ош" && p.address !== "Нет данных") {
            return `https://2gis.kg/search/${encodeURIComponent(p.name + ' ' + p.address)}`;
        }
        return `https://2gis.kg/search/${encodeURIComponent(p.name + ' Ош')}`;
    }

    function renderStars(rating) {
        const full = Math.floor(rating);
        const half = rating % 1 >= 0.5;
        let stars = '';
        for (let i = 0; i < full; i++) stars += '★';
        if (half) stars += '½';
        for (let i = stars.length; i < 5; i++) stars += '☆';
        return stars;
    }

    function renderCards() {
        let filtered = places.filter(p => {
            if (currentType !== "all" && p.type !== currentType) return false;
            if (currentOption && !p.options.includes(currentOption)) return false;
            if (partnerFilter) {
                const saved = localStorage.getItem('osh_food_partners');
                if (saved) {
                    const partners = JSON.parse(saved);
                    if (!partners[p.name]) return false;
                } else return false;
            }
            return true;
        });

        if (sortBy === 'rating-desc') filtered.sort((a,b) => b.rating - a.rating);
        else if (sortBy === 'name-asc') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortBy === 'price-low') filtered.sort((a,b) => (a.price || 9999) - (b.price || 9999));
        else if (sortBy === 'price-high') filtered.sort((a,b) => (b.price || 0) - (a.price || 0));

        document.getElementById('stats-count').innerHTML = `🍽️ Найдено: ${filtered.length} заведений`;
        const container = document.getElementById('cards-container');
        container.innerHTML = filtered.map(p => `
            <div class="card">
                <div class="card-header">
                    <div class="place-name">${p.name}</div>
                    <div class="type-badge">${p.type}</div>
                </div>
                <div class="rating-row">
                    <div class="stars">${renderStars(p.rating)}</div>
                    <div class="rating-value">${p.rating}</div>
                    <div class="reviews-count">${p.reviews} отз.</div>
                </div>
                <div class="cuisine"><i class="fas fa-utensils"></i> ${p.cuisine}</div>
                <div class="address"><i class="fas fa-map-pin"></i> ${p.address}</div>
                ${p.price ? `<div class="price"><i class="fas fa-tenge-sign"></i> ~${p.price} сом</div>` : ''}
                <div class="tags">
                    ${p.options.map(opt => `<span class="tag">${opt}</span>`).join('')}
                </div>
                <div class="card-footer">
                    <a href="${getGisLink(p)}" target="_blank" rel="noopener noreferrer" class="gis-link"><i class="fas fa-external-link-alt"></i> Открыть в 2ГИС</a>
                    <label class="partner-checkbox">
                        <input type="checkbox" class="partner-checkbox-input" data-name="${p.name}" ${localStorage.getItem('osh_food_partners') && JSON.parse(localStorage.getItem('osh_food_partners'))[p.name] ? 'checked' : ''}> 🤝 Партнёр
                    </label>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.partner-checkbox-input').forEach(cb => {
            cb.addEventListener('change', () => { savePartners(); if(partnerFilter) renderCards(); });
        });
    }

    // Фильтры-чипсы
    document.querySelectorAll('.filter-chip[data-filter="type"]').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip[data-filter="type"]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentType = chip.dataset.value;
            renderCards();
        });
        if (chip.dataset.value === "all") chip.classList.add('active');
    });

    document.querySelectorAll('.filter-chip[data-filter="option"]').forEach(chip => {
        chip.addEventListener('click', () => {
            const val = chip.dataset.value;
            if (currentOption === val) {
                currentOption = null;
                chip.classList.remove('active');
            } else {
                document.querySelectorAll('.filter-chip[data-filter="option"]').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentOption = val;
            }
            renderCards();
        });
    });

    document.getElementById('partner-toggle-chip').addEventListener('click', () => {
        partnerFilter = !partnerFilter;
        document.getElementById('partner-toggle-chip').classList.toggle('active', partnerFilter);
        renderCards();
    });

    document.getElementById('sort-select').addEventListener('change', (e) => {
        sortBy = e.target.value;
        renderCards();
    });

    renderCards();
    loadPartners();
</script>
</body>
</html>
