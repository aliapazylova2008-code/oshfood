    let partnerFilter = false;
    let currentType = "all";
    let currentCuisine = "all";
    let currentPrice = "all";
    let sortBy = "name-asc";

    function savePartners() {
        const partners = {};
        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            partners[cb.dataset.name] = cb.checked;
        });
        localStorage.setItem('osh_food_partners', JSON.stringify(partners));
    }

    function loadPartners() {
        const saved = localStorage.getItem('osh_food_partners');
        if (saved) {
            const partners = JSON.parse(saved);
            document.querySelectorAll('.partner-checkbox').forEach(cb => {
                if (partners[cb.dataset.name]) cb.checked = true;
            });
        }
    }

    function getGisLink(p) {
        if (p.gis) return p.gis;
        if (p.address && p.address !== "Ош" && p.address !== "Нет данных") {
            return `https://2gis.kg/search/${encodeURIComponent(p.name + ' ' + p.address)}`;
        }
        return `https://2gis.kg/search/${encodeURIComponent(p.name + ' Ош')}`;
    }

    function renderTable() {
        let filtered = places.filter(p => {
            if (currentType !== "all" && p.type !== currentType) return false;
            if (currentCuisine !== "all" && !p.cuisine.includes(currentCuisine)) return false;
            const price = p.price || 0;
            if (currentPrice === "low" && (price > 300 || price === 0)) return false;
            if (currentPrice === "mid" && (price < 300 || price > 800)) return false;
            if (currentPrice === "high" && price < 800) return false;
            if (partnerFilter) {
                const saved = localStorage.getItem('osh_food_partners');
                if (saved) {
                    const partners = JSON.parse(saved);
                    if (!partners[p.name]) return false;
                } else return false;
            }
            return true;
        });

        if (sortBy === 'name-asc') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortBy === 'name-desc') filtered.sort((a,b) => b.name.localeCompare(a.name));
        else if (sortBy === 'price-low') filtered.sort((a,b) => (a.price || 9999) - (b.price || 9999));
        else if (sortBy === 'price-high') filtered.sort((a,b) => (b.price || 0) - (a.price || 0));
        else if (sortBy === 'rating-desc') filtered.sort((a,b) => (b.rating || 0) - (a.rating || 0));

        document.getElementById('stats-count').innerHTML = `🍽️ Найдено: ${filtered.length} заведений`;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = filtered.map((p, idx) => `
            <tr>
                <td>${idx+1}</td>
                <td><strong>${p.name}</strong></td>
                <td>${p.type}</td>
                <td>${p.cuisine || '—'}</td>
                <td class="address">${p.address}</td>
                <td class="price-tag">${p.price ? `~ ${p.price} сом` : '—'}</td>
                <td>${(p.options || []).map(opt => `<span class="badge"><i class="fas ${opt.includes('🚴') ? 'fa-motorcycle' : opt.includes('☀️') ? 'fa-sun' : opt.includes('🌙') ? 'fa-moon' : 'fa-tag'}"></i> ${opt}</span>`).join('')}</td>
                <td>${p.rating || 0}</td>
                <td class="link-2gis"><a href="${getGisLink(p)}" target="_blank" rel="noopener noreferrer">📍 Открыть в 2ГИС</a></td>
                <td><input type="checkbox" class="partner-checkbox" data-name="${p.name}" ${localStorage.getItem('osh_food_partners') && JSON.parse(localStorage.getItem('osh_food_partners'))[p.name] ? 'checked' : ''}></td>
            </tr>
        `).join('');

        document.querySelectorAll('.partner-checkbox').forEach(cb => {
            cb.addEventListener('change', () => { savePartners(); if(partnerFilter) renderTable(); });
        });
    }

    document.getElementById('filter-type').addEventListener('change', (e) => { currentType = e.target.value; renderTable(); });
    document.getElementById('filter-cuisine').addEventListener('change', (e) => { currentCuisine = e.target.value; renderTable(); });
    document.getElementById('filter-price').addEventListener('change', (e) => { currentPrice = e.target.value; renderTable(); });
    document.getElementById('sort-by').addEventListener('change', (e) => { sortBy = e.target.value; renderTable(); });
    document.getElementById('partner-filter-btn').addEventListener('click', () => {
        partnerFilter = !partnerFilter;
        document.getElementById('partner-filter-btn').classList.toggle('active', partnerFilter);
        renderTable();
    });

    renderTable();
    loadPartners();
